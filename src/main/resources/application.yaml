spring:
  profiles:
    active: local
  application:
    name: order-management
  jackson:
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    kafka:
      enabled: true
    redis:
      enabled: true